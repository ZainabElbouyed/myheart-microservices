<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />
    <meta
      name="description"
      content="MyHeart Healthcare System - Système de gestion de santé moderne pour patients, médecins et personnel hospitalier"
    />
    <meta name="keywords" content="healthcare, medical, patients, doctors, appointments, hospital management" />
    <meta name="author" content="MyHeart Team" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="MyHeart Healthcare System" />
    <meta property="og:description" content="Système de gestion de santé moderne et efficace" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myheart-healthcare.com" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyHeart Healthcare System" />
    <meta name="twitter:description" content="Système de gestion de santé moderne et efficace" />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    
    <!-- Title -->
    <title>MyHeart Healthcare System</title>
  </head>
  <body>
    <noscript>
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; text-align: center; padding: 20px;">
        <div>
          <h1 style="color: #1976d2;">MyHeart Healthcare System</h1>
          <p style="font-size: 18px; color: #333; margin: 20px 0;">
            JavaScript est requis pour utiliser cette application.
          </p>
          <p style="font-size: 16px; color: #666;">
            Veuillez activer JavaScript dans les paramètres de votre navigateur pour continuer.
          </p>
        </div>
      </div>
    </noscript>
    
    <!-- Point d'entrée React -->
    <div id="root"></div>
    
    <!-- Loading indicator (optionnel, s'affiche pendant le chargement) -->
    <div id="loading" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f5f5f5; z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
      <div style="width: 50px; height: 50px; border: 5px solid #e0e0e0; border-top-color: #1976d2; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="margin-top: 20px; font-family: 'Roboto', sans-serif; color: #1976d2; font-size: 16px;">Chargement de MyHeart...</p>
    </div>
    
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    
    <script>
      // Afficher le loader pendant le chargement initial
      document.getElementById('loading').style.display = 'flex';
      
      // Cacher le loader quand React est chargé
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.getElementById('loading').style.display = 'none';
        }, 500);
      });
    </script>
  </body>
</html>
