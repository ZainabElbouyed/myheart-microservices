spring:
  application:
    name: doctor-service
  main:
    allow-bean-definition-overriding: true 
  datasource:
    url: jdbc:postgresql://postgres:5432/patientdb
    username: myheart
    password: myheart123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: myheart
    password: myheart123

  cloud:
    consul:
      enabled: true
      host: consul
      port: 8500
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 15s
        instance-id: ${spring.application.name}:${random.value} 


server:
  port: 8083

jwt:
  secret: ${JWT_SECRET}



patient:
  service:
    url: http://patient-service:8082

lab:
  service:
    url: http://lab-service:8086

prescription:
  service:
    url: http://prescription-service:8087

appointment:
  service:
    url: http://appointment-service:8084

logging:
  level:
    com.myheart: INFO

resilience4j:
  circuitbreaker:
    instances:
      appointmentService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      labService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      patientService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      prescriptionService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

  timelimiter:
    instances:
      appointmentService:
        timeoutDuration: 5s
      labService:
        timeoutDuration: 5s
      patientService:
        timeoutDuration: 5s
      prescriptionService:
        timeoutDuration: 5s

  retry:
    instances:
      appointmentService:
        maxAttempts: 2
        waitDuration: 1s
      labService:
        maxAttempts: 3
        waitDuration: 1s
      patientService:
        maxAttempts: 2
        waitDuration: 500ms
      prescriptionService:
        maxAttempts: 3
        waitDuration: 1s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
