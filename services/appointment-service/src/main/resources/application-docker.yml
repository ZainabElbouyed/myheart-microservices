spring:
  application:
    name: appointment-service
  main:
    allow-bean-definition-overriding: true 
  datasource:
    url: jdbc:postgresql://postgres:5432/appointmentdb
    username: myheart
    password: myheart123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: myheart
    password: myheart123
  
  cloud:
    consul:
      enabled: true
      host: consul
      port: 8500
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 15s
        instance-id: ${spring.application.name}:${random.value}
server:
  port: 8084

jwt:
  secret: ${JWT_SECRET:myheartSecretKey2024ForJWTTokenGeneration}

logging:
  level:
    com.myheart: INFO

patient:
  service:
    url: http://patient-service:8082

doctor:
  service:
    url: http://doctor-service:8083

billing:
  service:
    url: http://billing-service:8085

notification:
  service:
    url: http://notification-service:8089


# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      patientService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      doctorService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      billingService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

  timelimiter:
    instances:
      patientService:
        timeoutDuration: 5s
      doctorService:
        timeoutDuration: 5s
      billingService:
        timeoutDuration: 5s

  retry:
    instances:
      patientService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      doctorService:
        maxAttempts: 2
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
      billingService:
        maxAttempts: 3
        waitDuration: 1s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true