spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:postgresql://postgres:5432/authdb
    username: myheart
    password: myheart123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:myheartSecretKey2024ForJWTTokenGeneration}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.myheart: INFO
    

management:
  endpoints:
    web:
      exposure:
        include: health,info