spring:
  application:
    name: pharmacy-service
  main:
    allow-bean-definition-overriding: true 
  datasource:
    url: jdbc:mysql://mysql:3306/pharmacydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC 
    username: myheart
    password: myheart123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  
  cloud:
    consul:
      enabled: true
      host: consul
      port: 8500
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 15s
        instance-id: ${spring.application.name}:${random.value} 

server:
  port: 8088

jwt:
  secret: ${JWT_SECRET}

prescription:
  service:
    url: http://prescription-service:8087

patient:
  service:
    url: http://patient-service:8082

doctor:
  service:
    url: http://doctor-service:8083

logging:
  level:
    com.myheart: INFO

resilience4j:
  circuitbreaker:
    instances:
      prescriptionService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

  timelimiter:
    instances:
      prescriptionService:
        timeoutDuration: 5s

  retry:
    instances:
      prescriptionService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always