spring:
  application:
    name: prescription-service
  main:
    allow-bean-definition-overriding: true 
  data:
    mongodb:
      uri: mongodb://myheart:myheart123@mongodb:27017/prescriptiondb?authSource=admin
      auto-index-creation: false
  
  cloud:
    consul:
      enabled: true
      host: consul
      port: 8500
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 15s
        instance-id: ${spring.application.name}:${random.value} 

server:
  port: 8087

jwt:
  secret: ${JWT_SECRET}

patient:
  service:
    url: http://patient-service:8082

doctor:
  service:
    url: http://doctor-service:8083

pharmacy:
  service:
    url: http://pharmacy-service:8088

logging:
  level:
    com.myheart: INFO

resilience4j:
  circuitbreaker:
    instances:
      patientService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      doctorService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      pharmacyService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

  timelimiter:
    instances:
      patientService:
        timeoutDuration: 5s
      doctorService:
        timeoutDuration: 5s
      pharmacyService:
        timeoutDuration: 5s

  retry:
    instances:
      patientService:
        maxAttempts: 2
        waitDuration: 1s
      doctorService:
        maxAttempts: 2
        waitDuration: 1s
      pharmacyService:
        maxAttempts: 3
        waitDuration: 1s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers