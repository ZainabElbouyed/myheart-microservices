spring:
  application:
    name: notification-service
  
  main:
    allow-bean-definition-overriding: true 
  data:
    mongodb:
      uri: mongodb://myheart:myheart123@mongodb:27017/notifications?authSource=admin
      auto-index-creation: false
  
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: myheart
    password: myheart123
  
  kafka:
    bootstrap-servers: kafka:9092

    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "com.myheart.common.events"

    topics:
      appointment-events: appointment-events

  
  cloud:
    consul:
      enabled: true
      host: consul
      port: 8500
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 15s
        instance-id: ${spring.application.name}:${random.value} 

server:
  port: 8089

jwt:
  secret: ${JWT_SECRET:myheartSecretKey2024ForJWTTokenGeneration}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:dummy_account_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:dummy_auth_token}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}

logging:
  level:
    com.myheart: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always